name: Bundle Sync

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check-bundle-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: refs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            if git show-ref --verify --quiet refs/heads/main; then
              echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
            else
              echo "base=origin/main" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Verify Oak/bundle synchronization
        shell: bash
        run: .github/scripts/check_bundle_sync.sh "${{ steps.refs.outputs.base }}" "HEAD"
